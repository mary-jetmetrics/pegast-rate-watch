name: Курс Пегаса

on:
  schedule:
    # Четыре попытки за ночь, все — по будням в Перми (UTC+5). Курс на сегодня Пегас
    # выставил ещё вчера после 17:30 МСК, так что ночью он давно готов и ждать утра
    # незачем. Сообщение уходит одно: дошедший первым помечает день в last_sent.txt,
    # остальные видят отметку и молчат.
    #
    # Попыток несколько, потому что у расписаний Actions нет гарантий по времени:
    # 13.07 утренний запуск опоздал на 3 часа 18 минут, а вечерний не случился вовсе.
    # Даже с таким опозданием первая попытка приземляется около 06:00 по Перми, а
    # чтобы сообщения не было к утру, должны пропасть все четыре подряд.
    #
    # Минуты некруглые намеренно: очередь Actions длиннее всего в начале часа.
    # Выходные пропускаем: пятничный курс держится до понедельника, а субботу с
    # воскресеньем скрипт всё равно доберёт задним числом.
    - cron: "37 21 * * 0-4"  # 02:37 по Перми
    - cron: "7 23 * * 0-4"   # 04:07 по Перми
    - cron: "37 0 * * 1-5"   # 05:37 по Перми
    - cron: "37 2 * * 1-5"   # 07:37 по Перми — последний рубеж
  workflow_dispatch:
    inputs:
      preview:
        description: "Курс на завтра вместо курса на сегодня"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: rates
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Забрать курс и отправить в Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PREVIEW: ${{ inputs.preview }}
          # Руками запускают, когда сообщение нужно прямо сейчас, — отметка не помеха.
          MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [[ "$PREVIEW" == "true" ]]; then
            python3 rates.py --preview
          elif [[ "$MANUAL" == "true" ]]; then
            python3 rates.py --force
          else
            python3 rates.py
          fi

      - name: Сохранить историю и отметку
        run: |
          if [[ -n "$(git status --porcelain history.csv last_sent.txt)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add history.csv last_sent.txt
            git commit -m "Курс за $(date -u +%F)"
            git push
          else
            echo "Ничего не изменилось"
          fi
