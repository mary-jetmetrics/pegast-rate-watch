name: Курс Пегаса

on:
  schedule:
    # 02:37 UTC = 07:37 по Перми (UTC+5), по будням.
    # Курс на сегодня Пегас поставил вчера после 17:30 МСК, так что к утру он готов.
    # Важно лишь успеть до начала рабочего дня турагента: платим через неё.
    # Минута некруглая намеренно: расписания в Actions не имеют гарантий по времени,
    # а очередь длиннее всего в начале часа, куда целится большинство кронов.
    # Выходные пропускаем: пятничный курс держится до понедельника, а субботу
    # с воскресеньем скрипт всё равно доберёт задним числом.
    - cron: "37 2 * * 1-5"
    # 14:31 UTC = 17:31 МСК, по будням — вечерний предварительный курс на завтра.
    # Пегас выставляет его после 17:30 МСК, точная минута неизвестна. Опоздание
    # Actions здесь работает на нас: чем позже реально стартует, тем выше шанс
    # застать уже выставленный курс. Если не застали — сообщение скажет об этом,
    # потому что отличить "не выставлен" от "оставлен прежним" по API нельзя.
    - cron: "31 14 * * 1-5"
  workflow_dispatch:
    inputs:
      preview:
        description: "Предварительный курс на завтра вместо курса на сегодня"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: rates
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Забрать курс и отправить в Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PREVIEW: ${{ github.event.schedule == '31 14 * * 1-5' || inputs.preview }}
        run: |
          if [[ "$PREVIEW" == "true" ]]; then
            python3 rates.py --preview
          else
            python3 rates.py
          fi

      - name: Сохранить историю
        run: |
          if [[ -n "$(git status --porcelain history.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add history.csv
            git commit -m "Курс за $(date -u +%F)"
            git push
          else
            echo "История не изменилась"
          fi
